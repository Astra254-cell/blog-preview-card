<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog preview card</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <main class="container">
            <article class="blog-card">
                <img src="./images/illustration-article.svg"
                    alt="illustration-article photo" class="card-image">

                <div class="card-content">
                    <span class="category">Learning</span>
                    <p class="publish-date">Published 21 Dec 2023</p>
                    <h1 class="card-title">
                        <a href="#">HTML & CSS foundations</a>
                    </h1>
                    <p class="card-description">
                        These languages are the backbone of every website,
                        defining structure,content, and presentation.
                    </p>

                    <footer class="author">
                        <img src="./images/image-avatar.webp"
                            alt="Greg Hooper avatar">

                        <p class="author-name">Greg Hooper</p>
                    </footer>
                </div>
            </article>
        </main>
    </body>
</html>
